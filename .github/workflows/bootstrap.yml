name: bootstrap

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC（上流変化での破綻検知）

concurrency:
  group: bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-15 # arm64 = aarch64-darwin（flake の hostPlatform に一致）
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # file:// clone で確実に対象コミットを展開するため全履歴

      # 前提① nix（公式/upstream 版）を導入。Determinate デーモンは nix-darwin と競合するため無効化
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes

      # 前提② yadm を導入（Homebrew はランナーにプリインストール済み＝前提③を満たす）
      - name: Install yadm
        run: brew install yadm

      # flake の darwinConfigurations.ci-runner を選択させる
      - name: Set CI host identity
        run: sudo scutil --set LocalHostName ci-runner

      # Determinate 版インストーラが作る /etc/nix/nix.custom.conf を退避（nix-darwin が
      # 見覚えのない custom 設定を検出すると activation を中断するため）。
      - name: Move aside Determinate custom nix.conf (nix-darwin takeover)
        run: sudo mv /etc/nix/nix.custom.conf /etc/nix/nix.custom.conf.before-nix-darwin 2>/dev/null || true

      # チェックアウトしたこのコミットを yadm 管理下($HOME)へ展開
      - name: Seed yadm repo from checkout
        run: |
          set -eux
          head_sha=$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)
          yadm clone -f --no-bootstrap "file://$GITHUB_WORKSPACE/.git"
          yadm reset --hard "$head_sha"
          yadm alt # ##os.Darwin の alternates(bootstrap シンボリックリンク等)を実体化

      # 本番の bootstrap を実行（nix-darwin switch まで）。非ゼロ終了で CI 失敗
      # bootstrap 内で `nix run nix-darwin/master#darwin-rebuild` が未ピン留めの
      # flake 参照を解決するたびに api.github.com を未認証で叩くため、Actions ランナー
      # の共有 IP だと rate limit (60 req/h) に達しやすい。GITHUB_TOKEN で認証させる。
      - name: Run yadm bootstrap
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"
        run: yadm bootstrap

      # 導入結果の簡易確認（失敗しても本体判定は上の step で済んでいるので tolerant）
      # gh/mise/cloudflared は Home Manager(nix) 側に移動したので HM プロファイルも PATH に含める。
      - name: Verify toolchain
        run: |
          set -x
          export PATH="/opt/homebrew/bin:/run/current-system/sw/bin:/etc/profiles/per-user/runner/bin:$HOME/.nix-profile/bin:$PATH"
          darwin-rebuild --version || true
          for c in nix yadm gh mise cloudflared starship; do command -v "$c" || true; done

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40 # nix 導入 + Home Manager ビルドの分だけ余裕を持たせる
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 前提 nix（公式/upstream 版）を導入。bootstrap##os.Linux が `nix run` を呼ぶため必須。
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Install yadm
        run: sudo apt-get update && sudo apt-get install -y yadm

      - name: Seed yadm repo from checkout
        run: |
          set -eux
          head_sha=$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)
          yadm clone -f --no-bootstrap "file://$GITHUB_WORKSPACE/.git"
          yadm reset --hard "$head_sha"
          yadm alt # ##os.Linux の alternates を実体化

      # Linux bootstrap は非対話(mise install --yes)・sudo 不要。exit code で判定
      # macos 側と同様、bootstrap 内の `nix run github:nix-community/home-manager`
      # も未ピン留めの flake 参照で api.github.com を未認証で叩くため、GITHUB_TOKEN で認証させる。
      - name: Run yadm bootstrap
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"
        run: yadm bootstrap
